services:
  hec-golf:
    build: .
    container_name: hec-golf-league
    restart: unless-stopped
    ports:
      - "3002:3000"        # Access at http://your-lab-ip:3002
    environment:
      - DATABASE_URL=file:/app/data/hec.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data   # SQLite database persists here on the host

# ── First-run setup ───────────────────────────────────────────────────────────
#
#   1. Copy your database into place:
#        mkdir -p data && cp dev.db data/hec.db
#
#   2. Create a .env file with your Anthropic key:
#        echo 'ANTHROPIC_API_KEY="sk-ant-..."' > .env
#
#   3. Build and start:
#        docker compose up -d --build
#
#   4. View logs:
#        docker compose logs -f
